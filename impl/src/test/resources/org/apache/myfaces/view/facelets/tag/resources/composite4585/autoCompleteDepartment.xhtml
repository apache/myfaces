<ui:component xmlns="http://www.w3.org/1999/xhtml"
              xmlns:cc="http://java.sun.com/jsf/composite"
              xmlns:ui="http://java.sun.com/jsf/facelets"
              xmlns:h="http://java.sun.com/jsf/html"
              xmlns:tst="http://at.test.test/jsf-taglib">
    <cc:interface>
        <cc:attribute name="value" required="true"/>
        <cc:editableValueHolder name="input"/>
    </cc:interface>
    <cc:implementation>
        <div id="#{cc.clientId}">
            <tst:autoCompleteBase value="#{cc.attrs.value}"
                                  converter="#{autoCompleteDepartmentConverter}">
                <ui:define name="autoCompleteChildren">
                    <cc:insertChildren/>
                    <h:outputText styleClass="departmentName" value="#{item.name}"/>
                </ui:define>
            </tst:autoCompleteBase>
        </div>
    </cc:implementation>
</ui:component>

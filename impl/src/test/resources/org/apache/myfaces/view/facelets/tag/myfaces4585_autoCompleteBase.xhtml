<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:t="http://apache.myfaces.org/test/tagAttribute">

    <!--@elvariable id="value" type="java.lang.Object"-->
    <!--@elvariable id="converter" type="jakarta.faces.convert.Converter"-->

    <t:tagAttribute name="value" default=""/>
    <t:tagAttribute name="converter" default=""/>

    <div>
        <!--
          PrimeFaces reproducer (p:autoComplete) EL surface (same bindings), without PrimeFaces:
          value, converter, completeMethod -> suggest(), var=item, itemValue, itemLabel
        -->
        <h:inputText id="input"
                     value="#{value}"
                     converter="#{converter}"/>
        <ui:repeat value="#{converter.suggest('')}" var="item">
            <span class="myfaces4585-itemLabel"><h:outputText value="#{converter.getDisplayValue(item)}"/></span>
            <span class="myfaces4585-itemValue"><h:outputText value="#{item}"/></span>
            <ui:insert name="autoCompleteChildren"/>
        </ui:repeat>
    </div>
</ui:composition>

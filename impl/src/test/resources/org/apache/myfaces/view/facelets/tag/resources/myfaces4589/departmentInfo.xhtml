<ui:component xmlns="http://www.w3.org/1999/xhtml"
              xmlns:cc="http://java.sun.com/jsf/composite"
              xmlns:ui="http://java.sun.com/jsf/facelets"
              xmlns:test="http://java.sun.com/jsf/composite/myfaces4589">
    <cc:interface>
        <cc:attribute name="value" required="true"/>
    </cc:interface>
    <cc:implementation>
        <div id="#{cc.clientId}">
            <test:outputIconText icon="#{icon.test} #{color.blue}" value="#{cc.attrs.value.name}"/>
        </div>
    </cc:implementation>
</ui:component>

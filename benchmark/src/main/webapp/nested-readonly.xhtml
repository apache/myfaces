<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">
<h:head>
    <title>nested-readonly</title>
</h:head>
<h:body>
    <h:dataTable value="#{dataBean.groups}" var="group">
        <h:column>
            #{group.label}
            <h:dataTable value="#{group.rows}" var="row">
                <h:column>#{row.id}</h:column>
                <h:column>#{row.name}</h:column>
                <h:column>#{row.description}</h:column>
                <h:column>#{row.price}</h:column>
            </h:dataTable>
        </h:column>
    </h:dataTable>
</h:body>
</html>
